services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hybrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hybrid}
      POSTGRES_DB: ${POSTGRES_DB:-hybrid_rag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hybrid} -d ${POSTGRES_DB:-hybrid_rag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - "ES_JAVA_OPTS=-Xms192m -Xmx192m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Override in .env if credentials differ from postgres service defaults
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://hybrid:hybrid@postgres:5432/hybrid_rag}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
    volumes:
      - uploads_data:/app/uploads
      - hf_cache:/app/.cache/huggingface
    ports:
      - "${BACKEND_PORT:-8200}:8200"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://hybrid:hybrid@postgres:5432/hybrid_rag}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      RUN_MIGRATIONS: "0"
    volumes:
      - uploads_data:/app/uploads
      - hf_cache:/app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    # Same image as backend; entrypoint skips migrations when RUN_MIGRATIONS=0
    command: ["python", "worker.py"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://rag.rajanjasani.in:8200}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  es_data:
  uploads_data:
  hf_cache:
